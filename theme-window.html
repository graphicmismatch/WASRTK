<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASRTK Theme Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-window-body">
    <div class="theme-window">
        <header class="theme-window-header">
            <div>
                <h1>Application Theme</h1>
                <p class="theme-help">Edit the WASRTK UI colors stored in the OS-specific theme config file.</p>
            </div>
            <div class="theme-actions">
                <button id="saveThemeBtn" class="btn btn-primary">Save Theme</button>
                <button id="resetThemeBtn" class="btn btn-secondary">Reset to Default</button>
            </div>
        </header>

        <section class="panel-section">
            <p class="theme-config-path"><strong>Config file:</strong> <span id="themeConfigPath"></span></p>
            <div id="themeFields" class="theme-color-grid theme-color-grid-wide"></div>
        </section>

        <section class="panel-section">
            <h2>Raw Config Editor</h2>
            <p class="theme-help">You can edit the JSON directly and save it without leaving the app.</p>
            <textarea id="themeConfigEditor" class="theme-config-editor"></textarea>
            <div class="theme-actions">
                <button id="saveThemeConfigFileBtn" class="btn btn-primary">Save Config File</button>
            </div>
        </section>
    </div>

    <script src="theme-window.js"></script>
</body>
</html>
